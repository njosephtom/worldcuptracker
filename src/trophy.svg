<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 262" overflow="visible">

  <!-- ── BOTTOM BASE TIER (widest, gold) ── -->
  <rect x="9"  y="240" width="92" height="20" rx="3"
        fill="#EAB308" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- ── ORANGE / AMBER TIER ── -->
  <rect x="15" y="218" width="80" height="24" rx="2"
        fill="#F97316" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- ── GREEN STRIPE ── -->
  <rect x="15" y="205" width="80" height="15" rx="1"
        fill="#22C55E" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- ── UPPER BASE (gold, narrower) ── -->
  <rect x="25" y="192" width="60" height="15" rx="1"
        fill="#EAB308" stroke="#111" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- ── MAIN BODY: globe top → arms → waist → stem ──
       Left arm sweeps to x≈4 at y≈95; right arm to x≈106. ── -->
  <path fill="#EAB308" stroke="#111" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"
        d="M 55,11
           C 78,11 92,27 92,52
           C 92,66 97,79 106,95
           C 112,108 110,124 98,132
           C 89,138 79,143 75,155
           C 71,165 73,177 70,185
           C 68,191 63,196 57,198
           L 53,198
           C 47,196 42,191 40,185
           C 37,177 39,165 35,155
           C 31,143 21,138 12,132
           C 0,124 -2,108 4,95
           C 13,79 18,66 18,52
           C 18,27 32,11 55,11 Z"/>

  <!-- ── GLOBE CIRCLE ── -->
  <circle cx="55" cy="51" r="33" fill="#F59E0B" stroke="#111" stroke-width="4.5"/>

  <!-- ── ORANGE ARC on globe top-left (the FIFA trophy's distinctive globe accent) ── -->
  <path fill="#F97316"
        d="M 30,25 C 20,33 18,46 22,57 C 30,47 40,41 56,38 Z"/>

  <!-- ── GLOBE detail: right-side curved reflection ── -->
  <path fill="none" stroke="#92400E" stroke-width="3" stroke-linecap="round"
        d="M 72,20 C 80,29 83,41 80,53"/>

  <!-- ── FIGURE sweep lines (the two figures whose raised arms hold the globe) ── -->
  <!-- Left figure outer sweep -->
  <path fill="none" stroke="#92400E" stroke-width="4" stroke-linecap="round"
        d="M 45,87 C 32,104 18,122 22,145"/>
  <!-- Right figure outer sweep -->
  <path fill="none" stroke="#92400E" stroke-width="4" stroke-linecap="round"
        d="M 65,87 C 78,104 92,122 88,145"/>

</svg>
