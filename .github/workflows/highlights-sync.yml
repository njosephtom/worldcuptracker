name: Sync Match Highlights

on:
  schedule:
    # PDT 12pm–11pm window (PDT = UTC−7):
    #   19:00 UTC = 12:00 PDT   21:00 UTC = 14:00 PDT   23:00 UTC = 16:00 PDT
    #   01:00 UTC = 18:00 PDT   03:00 UTC = 20:00 PDT   05:00 UTC = 22:00 PDT
    # Runs every 2 hours within the window — catches highlights within 2h of match end
    - cron: '0 19,21,23,1,3,5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch YouTube highlights for finished matches
        env:
          REACT_APP_YOUTUBE_API_KEY: ${{ secrets.REACT_APP_YOUTUBE_API_KEY }}
        run: node scripts/fetch-highlights.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/match-highlights.json
          git diff --cached --quiet || (git commit -m "chore: update match highlights [skip ci]" && git push)
