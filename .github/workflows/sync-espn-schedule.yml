name: Sync ESPN Schedule

on:
  schedule:
    # Daily at 10:00 AM PST (18:00 UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch full ESPN schedule
        run: node scripts/fetch-espn-schedule.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/match-schedule.json
          git diff --cached --quiet || (git commit -m "chore: sync match schedule [skip ci]" && git push)
