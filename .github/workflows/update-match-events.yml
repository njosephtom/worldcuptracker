name: Update Match Events

on:
  schedule:
    # Every 30 minutes, Pacific 10am–11pm
    # (10am PDT = 17:00 UTC → 11pm PST = 07:00 UTC next day; covers either DST state)
    - cron: '*/30 17-23,0-7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch match events from ESPN
        run: node scripts/fetch-match-events.js

      - name: Fetch FIFA world rankings
        run: node scripts/fetch-fifa-rankings.js
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/match-events.json public/fifa_ranking.yaml
          git diff --cached --quiet || (git commit -m "chore: update match events and FIFA rankings [skip ci]" && git push)
