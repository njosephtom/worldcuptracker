name: Update Match Events

on:
  schedule:
    # Every 30 minutes, PDT 12pm–11pm (PDT = UTC−7 → 19:00–06:00 UTC)
    - cron: '*/30 19-23,0-6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch match events from ESPN
        run: node scripts/fetch-match-events.js

      - name: Fetch FIFA world rankings
        run: node scripts/fetch-fifa-rankings.js
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/match-events.json public/fifa_ranking.yaml
          git diff --cached --quiet || (git commit -m "chore: update match events and FIFA rankings [skip ci]" && git push)
