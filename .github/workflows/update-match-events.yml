name: Update Match Events

on:
  schedule:
    # Every 30 minutes during tournament hours (10:00–02:00 UTC = 06:00 ET–22:00 ET)
    - cron: '*/30 10-23,0-2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch match events from ESPN
        run: node scripts/fetch-match-events.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/match-events.json
          git diff --cached --quiet || (git commit -m "chore: update match events [skip ci]" && git push)
