name: Sync ESPN Bracket

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch ESPN bracket data
        run: node scripts/fetch-espn-bracket.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/bracket-live.json
          git diff --cached --quiet || (git commit -m "chore: sync bracket results [skip ci]" && git push)
