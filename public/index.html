        <h1>FIFA World Cup 2026 — Live Scores, Schedule, Fixtures &amp; Standings</h1>
        <p class="intro">WorldCupTracker.us is your free, real-time FIFA World Cup 2026 tracker. Get live scores, the complete World Cup 2026 schedule &amp; fixtures, group stage standings, knockout bracket results, match highlights, and full squad information for all 48 teams — no registration required, no paywall.</p>

        <h2>About the FIFA World Cup 2026</h2>
        <p>The <strong>FIFA World Cup 2026</strong> is the 23rd edition of the FIFA World Cup, the most prestigious international football tournament on Earth. Hosted jointly by the <strong>United States</strong>, <strong>Canada</strong>, and <strong>Mexico</strong>, the 2026 World Cup marks the first time three nations have co-hosted the event and the first return of the World Cup to North America since 1994.</p>
        <p>The 2026 FIFA World Cup runs from <strong>June 11 to July 19, 2026</strong>, with the World Cup Final taking place at MetLife Stadium in East Rutherford, New Jersey. The tournament features a record <strong>48 national teams</strong> competing in <strong>104 total matches</strong> across <strong>16 host stadiums</strong> — the largest World Cup in history.</p>
        <p>All 48 qualified nations compete in <strong>12 groups of four</strong> during the group stage (June 11–June 26), followed by a knockout stage opening with the newly introduced <strong>Round of 32</strong> beginning June 29. The champion is crowned on July 19, 2026.</p>

        <h2>FIFA World Cup 2026 Schedule &amp; Fixtures</h2>
        <p>The complete <strong>FIFA World Cup 2026 schedule</strong> features 104 matches across six rounds of competition. WorldCupTracker.us displays all World Cup fixtures with real-time status, live scores, and results.</p>
        <h3>Group Stage Fixtures (June 11 – June 26, 2026)</h3>
        <p>The <strong>World Cup group stage schedule</strong> opens on June 11, 2026, at Estadio Azteca in Mexico City with Mexico vs South Africa. Over 16 days, 48 teams each play three fixtures across Groups A through L. All 12 groups play their final matchday simultaneously to preserve fairness. Notable group-stage fixtures include Brazil vs Morocco, Spain vs Cape Verde, Argentina vs Algeria, France vs Senegal, Germany vs Ivory Coast, England vs Panama, USA vs Paraguay, Canada vs Bosnia and Herzegovina, and many more.</p>
        <h3>Round of 32 (June 29 – July 1, 2026)</h3>
        <p>The <strong>World Cup Round of 32</strong> is a new knockout round introduced for 2026. The top two teams from each of the 12 groups (24 teams) plus the 8 best third-placed teams advance, creating 32 survivors who play 16 single-elimination matches.</p>
        <h3>Round of 16 (July 4–7, 2026)</h3>
        <p>The 16 surviving teams contest the <strong>World Cup Round of 16</strong> fixtures to reach the quarterfinals.</p>
        <h3>Quarterfinals (July 9–10, 2026)</h3>
        <p>The eight remaining teams play the <strong>World Cup quarterfinal</strong> matches at MetLife Stadium, AT&amp;T Stadium, SoFi Stadium, and Hard Rock Stadium.</p>
        <h3>Semifinals (July 14–15, 2026)</h3>
        <p>The final four nations compete in the <strong>World Cup semifinals</strong> for a place in the Final.</p>
        <h3>World Cup 2026 Final (July 19, 2026)</h3>
        <p>The <strong>FIFA World Cup 2026 Final</strong> is held at MetLife Stadium, New York/New Jersey, on July 19, 2026 — the climax of the largest World Cup ever staged.</p>

        <p>WorldCupTracker.us highlights <strong>today's World Cup matches</strong> at the top of the Match Day view, with live scores, kickoff countdowns, and results updated in real time. The tracker automatically shows all fixtures for the current day in your local timezone, so you always know who plays today in the World Cup.</p>
        <p>Each match listing shows the teams, kickoff time (in your timezone), live score, match minute, goal scorers, card events, venue, and group/round information.</p>

        <p><strong>FIFA World Cup 2026 live scores</strong> are updated in real time from ESPN's official data feed. During live matches, WorldCupTracker.us displays the current score, live match time (minute), goal scorer names, yellow and red card events, and halftime/full-time status. Live matches are highlighted with a red pulsing indicator. Auto-refresh updates every 5 minutes automatically, or click the refresh button for instant updates — no account or subscription needed.</p>
        <p>After each match, full-time results are recorded with the complete <strong>World Cup match event report</strong> showing all goals, assists, yellow cards, and red cards with the minute they occurred.</p>

        <h2>FIFA World Cup 2026 Tournament Format</h2>
        <p>The 2026 World Cup introduces the largest format in tournament history. Here's how the <strong>World Cup format</strong> works:</p>
        <ul>
          <li><strong>Group Stage:</strong> 48 teams in 12 groups of 4. Each team plays 3 matches. Top 2 from each group (24 teams) plus 8 best third-placed teams = 32 advance.</li>
          <li><strong>Round of 32 (NEW):</strong> 32 teams play 16 single-elimination matches. Winners advance to Round of 16.</li>
          <li><strong>Round of 16:</strong> 16 teams, 8 matches.</li>
          <li><strong>Quarterfinals:</strong> 8 teams, 4 matches.</li>
          <li><strong>Semifinals:</strong> 4 teams, 2 matches.</li>
          <li><strong>Third-Place Match:</strong> Semi-final losers compete for bronze.</li>
          <li><strong>Final:</strong> July 19, 2026 at MetLife Stadium.</li>
        </ul>
        <p>Total: <strong>104 matches</strong> (up from 64 in 2022). Total teams: <strong>48</strong> (up from 32).</p>
